# ==========================================
#           Wpets - Configuration
# ==========================================

# Database settings
database:
  # Type: sqlite or mysql
  type: sqlite
  # SQLite file path (relative to plugin data folder)
  sqlite-file: wpets.db
  # MySQL connection settings (only used when type: mysql)
  mysql:
    host: localhost
    port: 3306
    database: wpets
    username: root
    password: ''
    # Connection pool settings
    max-pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# XP formula: XP_required = level^2 * multiplier
xp-formula-multiplier: 100

# Auto-save interval in seconds
auto-save-interval: 300

# Maximum pet level
max-level: 100

# Skill points awarded per level
skill-points-per-level: 1

# Pet follow distance (blocks)
pet-follow-distance: 4.0

# Whether ModelEngine integration is enabled (requires ModelEngine plugin)
modelengine-enabled: false

# Whether to show level-up particles
show-levelup-particles: true

# Level milestone rewards
milestones:
  10:
    pet-particles: true
    player-commands:
      - "eco give {player} 500"
      - "lp user {player} meta addprefix 100 [PetTamer]"
  30:
    pet-model-change: true
    player-speed-boost: 0.05
    player-commands: []
  50:
    pet-ultimate-skill: true
    player-commands:
      - "give {player} netherite_sword 1"
  100:
    pet-corrupted-model: true
    pet-aura: true
    player-commands:
      - "advancement grant {player} only wpets:legendary_tamer"
      - "loot give {player} loot wpets:legendary_crate"

# Pet level rewards (claimable through /pet rewards menu)
# Players can claim these rewards once per pet when reaching the required level
rewards:
  5:
    player-commands:
      - "heal {player}"
    console-commands:
      - "eco give {player} 100"
    nexo-items:
      - "pet_treat:5"
  10:
    player-commands: []
    console-commands:
      - "eco give {player} 500"
      - "give {player} diamond 3"
    nexo-items:
      - "rare_pet_collar:1"
  20:
    player-commands: []
    console-commands:
      - "eco give {player} 1000"
      - "give {player} diamond 5"
    nexo-items:
      - "epic_pet_armor:1"
      - "pet_elixir:3"
  30:
    player-commands: []
    console-commands:
      - "eco give {player} 2000"
      - "give {player} netherite_ingot 2"
    nexo-items:
      - "legendary_pet_charm:1"
  50:
    player-commands: []
    console-commands:
      - "eco give {player} 5000"
      - "give {player} netherite_sword 1"
    nexo-items:
      - "mythic_pet_essence:1"
      - "ultimate_pet_token:1"
  75:
    player-commands: []
    console-commands:
      - "eco give {player} 10000"
      - "give {player} elytra 1"
    nexo-items:
      - "ancient_pet_relic:1"
  100:
    player-commands: []
    console-commands:
      - "eco give {player} 25000"
      - "advancement grant {player} only wpets:max_level_pet"
    nexo-items:
      - "divine_pet_crown:1"
      - "eternal_companion_trophy:1"

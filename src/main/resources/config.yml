# ==========================================
#           Wpets - Configuration
# ==========================================

# Database settings
database:
  # Type: sqlite or mysql
  type: sqlite
  # SQLite file path (relative to plugin data folder)
  sqlite-file: wpets.db
  # MySQL connection settings (only used when type: mysql)
  mysql:
    host: localhost
    port: 3306
    database: wpets
    username: root
    password: ''
    # Connection pool settings
    max-pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# XP formula: XP_required = level^2 * multiplier
xp-formula-multiplier: 100

# Auto-save interval in seconds
auto-save-interval: 300

# Maximum pet level
max-level: 100

# Skill points awarded per level
skill-points-per-level: 1

# Pet follow distance (blocks)
pet-follow-distance: 4.0

# Whether ModelEngine integration is enabled (requires ModelEngine plugin)
modelengine-enabled: false

# Whether to show level-up particles
show-levelup-particles: true

# Level milestone rewards
milestones:
  10:
    pet-particles: true
    player-commands:
      - "eco give {player} 500"
      - "lp user {player} meta addprefix 100 [PetTamer]"
  30:
    pet-model-change: true
    player-speed-boost: 0.05
    player-commands: []
  50:
    pet-ultimate-skill: true
    player-commands:
      - "give {player} netherite_sword 1"
  100:
    pet-corrupted-model: true
    pet-aura: true
    player-commands:
      - "advancement grant {player} only wpets:legendary_tamer"
      - "loot give {player} loot wpets:legendary_crate"

# Pet level rewards (claimable through /pet rewards menu)
# Players can claim these rewards once per pet when reaching the required level
rewards:
  5:
    # Optional: Custom slot position (if not specified, items are placed in order)
    slot: 10
    # Item appearance for different states
    item:
      # Before the player can claim (level requirement not met)
      locked:
        material: GRAY_DYE
        custom-model-data: 0
        name: "&7&lLevel {level} Reward &8(Locked)"
        lore:
          - ""
          - "&7Your pet level: &e{pet_level}"
          - "&7Required level: &e{level}"
          - ""
          - "&6Rewards:"
          - "{rewards}"
          - ""
          - "&c✘ Reach level {level} to unlock!"
      # When the player can claim (level requirement met, not yet claimed)
      claimable:
        material: YELLOW_DYE
        custom-model-data: 0
        name: "&e&lLevel {level} Reward &7(Click to claim!)"
        lore:
          - ""
          - "&7Your pet level: &e{pet_level}"
          - "&7Required level: &e{level}"
          - ""
          - "&6Rewards:"
          - "{rewards}"
          - ""
          - "&e&lClick to claim this reward!"
      # After the player has claimed the reward
      claimed:
        material: LIME_DYE
        custom-model-data: 0
        name: "&a&lLevel {level} Reward &7(Claimed)"
        lore:
          - ""
          - "&7Your pet level: &e{pet_level}"
          - "&7Required level: &e{level}"
          - ""
          - "&6Rewards:"
          - "{rewards}"
          - ""
          - "&a✔ Already claimed!"
    player-commands:
      - "heal {player}"
    console-commands:
      - "eco give {player} 100"
    nexo-items:
      - "pet_treat:5"
